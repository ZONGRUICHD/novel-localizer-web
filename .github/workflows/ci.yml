name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/check_repository.py

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --all-extras --locked
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest --cov=shiori --cov-report=term-missing --cov-fail-under=75
        env:
          SHIORI_ENV: test
      - run: uv run alembic upgrade head
        env:
          SHIORI_ENV: test
          SHIORI_DATABASE_URL: sqlite:///${{ runner.temp }}/alembic.sqlite3
      - run: uv run alembic check
        env:
          SHIORI_ENV: test
          SHIORI_DATABASE_URL: sqlite:///${{ runner.temp }}/alembic.sqlite3
      - run: uv run python scripts/export_openapi.py
        env:
          SHIORI_ENV: test
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: openapi/openapi.json

  frontend:
    name: Frontend and edge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm lint
        working-directory: frontend
      - run: pnpm test --run
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend
      - run: pnpm exec wrangler pages functions build
        working-directory: frontend

  openapi-drift:
    name: OpenAPI client drift
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: openapi-schema
          path: openapi
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm generate:api
        working-directory: frontend
      - run: git diff --exit-code -- frontend/src/api/schema.d.ts openapi/openapi.json

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv export --directory backend --locked --no-dev --format requirements-txt --no-emit-project --output-file "$RUNNER_TEMP/shiori-requirements.txt"
      - run: uvx --python 3.12 pip-audit -r "$RUNNER_TEMP/shiori-requirements.txt"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm audit --audit-level high
        working-directory: frontend
